[versions]
h2 = "2.4.240"
kotlin = "2.3.21"
kotlinx-html = "0.12.0"
logback = "1.5.34"
openfolder-kotlinAsyncapiKtor = "3.2.2"
postgresql = "42.7.11"

[libraries]
h2database-h2 = { module = "com.h2database:h2", version.ref = "h2" }
kotlinx-kotlinxHtml = { module = "org.jetbrains.kotlinx:kotlinx-html", version.ref = "kotlinx-html" }
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
openfolder-kotlinAsyncapiKtor = { module = "org.openfolder:kotlin-asyncapi-ktor", version.ref = "openfolder-kotlinAsyncapiKtor" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
